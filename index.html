<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распознавание фильмов по кадру</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Кино-Скан AI</h1>
        <p>Сфотографируй экран или загрузи скриншот кадра из фильма</p>

        <div class="media-controls">
            <button id="start-camera">Включить камеру</button>
            <button id="take-photo" class="hidden">Сделать фото</button>
            
            <label for="file-upload" class="custom-file-upload">
                Загрузить скриншот
            </label>
            <input id="file-upload" type="file" accept="image/*">
        </div>

        <div class="view-area">
            <video id="video" autoplay playsinline class="hidden"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <img id="preview" src="" alt="Превью" class="hidden">
        </div>

        <div id="result-box" class="hidden">
            <h2>Результат:</h2>
            <p id="movie-title">Загрузка нейросети...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
